<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ screen.name }}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: system-ui, sans-serif;
    }

    .view {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.6s ease;
      display: grid;
      padding: 1rem;
      gap: 0.75rem;
      overflow: hidden;
    }
    .view.active { opacity: 1; }
    .view > div { min-width: 0; min-height: 0; overflow: hidden; }

    /* Klocka */
    .widget-clock { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }

    /* Markdown */
    .widget-markdown { padding: 0.5rem; overflow-y: auto; touch-action: pan-y; }
    .widget-markdown h1 { font-size: 2em; font-weight: bold; margin-bottom: 0.5em; }
    .widget-markdown h2 { font-size: 1.5em; font-weight: bold; margin-bottom: 0.4em; }
    .widget-markdown h3 { font-size: 1.2em; font-weight: bold; margin-bottom: 0.3em; }
    .widget-markdown p  { margin-bottom: 0.6em; line-height: 1.5; }
    .widget-markdown ul, .widget-markdown ol { margin-left: 1.5em; margin-bottom: 0.6em; }
    .widget-markdown li { line-height: 1.5; }
    .widget-markdown strong { font-weight: bold; }
    .widget-markdown em { font-style: italic; }

    /* ICS-lista */
    .widget-ics-list {
      height: 100%; overflow-y: auto; padding: 0.6rem 0.75rem;
      display: flex; flex-direction: column; gap: 0;
      scrollbar-width: none;
    }
    .widget-ics-list.ics-sm { font-size: 0.8rem; }
    .widget-ics-list.ics-lg { font-size: 1.15rem; }
    .ics-day {
      font-size: 0.7em; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase; color: rgba(255,255,255,0.45);
      padding: 0.55em 0 0.2em; margin-top: 0.3em;
    }
    .ics-day:first-child { margin-top: 0; }
    .ics-ev {
      display: flex; align-items: baseline; gap: 0.5em;
      padding: 0.18em 0; border-bottom: 1px solid rgba(255,255,255,0.06);
      line-height: 1.35;
    }
    .ics-t {
      flex-shrink: 0; width: 3.2em; font-variant-numeric: tabular-nums;
      color: rgba(255,255,255,0.55); font-size: 0.85em;
    }
    .ics-s { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ics-loc { color: rgba(255,255,255,0.45); font-size: 0.85em; margin-left: 0.4em; }
    .ics-color-bar { flex-shrink: 0; width: 3px; border-radius: 2px; align-self: stretch; margin-right: 0.35em; }
    .ics-more-day { font-size: 0.68em; color: rgba(255,255,255,0.35); padding: 0.1em 0 0.2em; }
    .ics-notice, .ics-error { display: flex; align-items: center; justify-content: center;
      height: 100%; color: rgba(255,255,255,0.4); font-size: 0.85rem; text-align: center;
      padding: 1rem; }
    .ics-error { color: #f87171; }
    .ics-warn { font-size: 0.7em; color: rgba(251,191,36,0.7); text-align: right; margin-top: auto; padding-top: 0.3em; }
    .ics-updated { font-size: 0.65em; color: rgba(255,255,255,0.25); text-align: right; margin-top: auto; padding-top: 0.3em; }

    /* ics_month */
    .widget-ics-month { display:flex; flex-direction:column; height:100%; color:#fff; padding:0.4em 0.5em; font-size:clamp(8px,1.8cqh,13px); }
    .icm-title { text-align:center; font-weight:700; font-size:1.1em; padding-bottom:0.4em; color:rgba(255,255,255,0.85); }
    .icm-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; flex:1; min-height:0; }
    .icm-dow { text-align:center; font-size:0.72em; font-weight:600; color:rgba(255,255,255,0.4); padding:0.2em 0 0.4em; }
    .icm-cell { background:rgba(255,255,255,0.05); border-radius:3px; padding:0.15em 0.25em; overflow:hidden; min-height:0; }
    .icm-empty { background:transparent; }
    .icm-today { background:rgba(59,130,246,0.25); outline:1px solid rgba(59,130,246,0.6); }
    .icm-num { font-size:0.78em; font-weight:600; color:rgba(255,255,255,0.65); line-height:1.3; }
    .icm-today .icm-num { color:#93c5fd; }
    .icm-ev { font-size:0.62em; color:rgba(255,255,255,0.55); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; line-height:1.3; }
    .icm-more { font-size:0.58em; color:rgba(255,255,255,0.3); }

    /* Offline-banner */
    #offline-banner {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0;
      background: rgba(200,0,0,0.8);
      color: #fff;
      text-align: center;
      font-size: 0.8rem;
      padding: 4px;
      z-index: 100;
    }
    #offline-banner.visible { display: block; }

    /* Kiosk-navigation */
    #kiosk-nav {
      display: flex;
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      gap: 0.75rem;
      align-items: center;
      z-index: 200;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }
    #kiosk-nav.visible {
      opacity: 1;
      pointer-events: auto;
    }
    .kiosk-nav-btn {
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff;
      border-radius: 50%;
      width: 3rem;
      height: 3rem;
      font-size: 1.5rem;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
      transition: background 0.15s;
    }
    .kiosk-nav-btn:hover { background: rgba(0,0,0,0.8); }
    #nav-pause { font-size: 1rem; width: 2.4rem; height: 2.4rem; }
  </style>
</head>
<body>
  <div id="offline-banner">Ingen anslutning till server</div>

  <div id="kiosk-nav">
    <button class="kiosk-nav-btn" id="nav-prev" title="Föregående vy">&#8249;</button>
    <button class="kiosk-nav-btn" id="nav-pause" title="Pausa/spela">&#9646;&#9646;</button>
    <button class="kiosk-nav-btn" id="nav-next" title="Nästa vy">&#8250;</button>
  </div>

  {% for view in views %}
  <div
    class="view{% if loop.first %} active{% endif %}"
    data-position="{{ view.position }}"
    data-duration="{{ view.duration_seconds }}"
    id="view-{{ view.position }}"
    style="grid-template-columns: repeat({{ view.grid_cols }}, 1fr); grid-template-rows: repeat({{ view.grid_rows }}, 1fr);"
  >
    {% for widget in view.widgets %}
    <div data-widget-id="{{ widget.widget_id }}"
         style="grid-column: {{ widget.col_start }} / {{ widget.col_end }}; grid-row: {{ widget.row_start }} / {{ widget.row_end }}; z-index: {{ widget.z_index }}; opacity: {{ (widget.opacity / 100) | round(2) }};">
      {{ widget.html | safe }}
    </div>
    {% endfor %}
  </div>
  {% endfor %}

  <script>
    const SCREEN_SLUG = {{ screen.slug | tojson }};
    const VIEW_COUNT  = {{ views | length }};
    const VIEWS       = [
      {% for v in views %}
      { position: {{ v.position }}, duration: {{ v.duration_seconds }} },
      {% endfor %}
    ];
  </script>
  <script src="/static/kiosk.js"></script>

  {% if show_debug %}
  <div id="debug-overlay" style="position:fixed;bottom:8px;right:8px;background:rgba(0,0,0,0.75);color:#fff;font-family:monospace;font-size:11px;padding:6px 10px;border-radius:4px;line-height:1.6;z-index:999">
    <div>{{ screen.name }} / {{ screen.slug }}</div>
    <div id="debug-view">Vy –/{{ views | length }}</div>
    <div id="debug-sse-age">SSE: –</div>
    <div id="debug-reconnects">Reconnects: 0</div>
    <div>v{{ version }}</div>
  </div>
  <script>window.__KIOSK_DEBUG = true;</script>
  {% endif %}
</body>
</html>
