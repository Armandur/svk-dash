<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ screen.name }}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: system-ui, sans-serif;
    }

    .view {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.6s ease;
      display: grid;
      padding: 1rem;
      gap: 0.75rem;
      overflow: hidden;
    }
    .view.active { opacity: 1; }
    .view > div { min-width: 0; min-height: 0; overflow: hidden; }

    /* Klocka */
    .widget-clock { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }

    /* Markdown */
    .widget-markdown { padding: 0.5rem; overflow-y: auto; touch-action: pan-y; }
    .widget-markdown h1 { font-size: 2em; font-weight: bold; margin-bottom: 0.5em; }
    .widget-markdown h2 { font-size: 1.5em; font-weight: bold; margin-bottom: 0.4em; }
    .widget-markdown h3 { font-size: 1.2em; font-weight: bold; margin-bottom: 0.3em; }
    .widget-markdown p  { margin-bottom: 0.6em; line-height: 1.5; }
    .widget-markdown ul, .widget-markdown ol { margin-left: 1.5em; margin-bottom: 0.6em; }
    .widget-markdown li { line-height: 1.5; }
    .widget-markdown strong { font-weight: bold; }
    .widget-markdown em { font-style: italic; }

    /* ICS-lista */
    .widget-ics-list {
      height: 100%; overflow-y: auto; padding: 0.6rem 0.75rem;
      display: flex; flex-direction: column; gap: 0;
      scrollbar-width: none;
    }
    .widget-ics-list.ics-sm { font-size: 0.8rem; }
    .widget-ics-list.ics-lg { font-size: 1.15rem; }
    .ics-day {
      font-size: 0.7em; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase; color: rgba(255,255,255,0.45);
      padding: 0.55em 0 0.2em; margin-top: 0.3em;
    }
    .ics-day:first-child { margin-top: 0; }
    .ics-ev {
      display: flex; align-items: baseline; gap: 0.5em;
      padding: 0.18em 0; border-bottom: 1px solid rgba(255,255,255,0.06);
      line-height: 1.35;
    }
    .ics-t {
      flex-shrink: 0; width: 3.2em; font-variant-numeric: tabular-nums;
      color: rgba(255,255,255,0.55); font-size: 0.85em;
    }
    .ics-s { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ics-loc { color: rgba(255,255,255,0.45); font-size: 0.85em; margin-left: 0.4em; }
    .ics-color-bar { flex-shrink: 0; width: 3px; border-radius: 2px; align-self: stretch; margin-right: 0.35em; }
    .widget-ics-list.ics-scrollable { overflow-y: auto; touch-action: pan-y; scrollbar-width: none; }
    .ics-online-badge { font-size: 0.8em; margin-left: 0.25em; opacity: 0.7; }
    .ics-ev-tentative { opacity: 0.6; }
    .ics-ev-tentative .ics-s { text-decoration: underline dotted rgba(255,255,255,0.4); }
    .icm-ev-tentative { opacity: 0.55; text-decoration: underline dotted rgba(255,255,255,0.4); }
    .icm-ev-free { font-style: italic; }
    .icw-ev-tentative { opacity: 0.55; text-decoration: underline dotted rgba(255,255,255,0.35); }
    .icw-ev-free { font-style: italic; }
    .isch-ev-block.isch-ev-tentative { opacity: 0.6; }
    .isch-ev-free { font-style: italic; }
    .ics-more-day { font-size: 0.68em; color: rgba(255,255,255,0.35); padding: 0.1em 0 0.2em; }
    .ics-notice, .ics-error { display: flex; align-items: center; justify-content: center;
      height: 100%; color: rgba(255,255,255,0.4); font-size: 0.85rem; text-align: center;
      padding: 1rem; }
    .ics-error { color: #f87171; }
    .ics-warn { font-size: 0.7em; color: rgba(251,191,36,0.7); text-align: right; margin-top: auto; padding-top: 0.3em; }
    .ics-updated { font-size: 0.65em; color: rgba(255,255,255,0.25); text-align: right; margin-top: auto; padding-top: 0.3em; }

    /* image / slideshow */
    .widget-image { width:100%; height:100%; overflow:hidden; }
    .widget-image.img-empty { display:flex; align-items:center; justify-content:center; color:rgba(255,255,255,0.3); font-size:0.85rem; }
    .widget-slideshow { width:100%; height:100%; position:relative; overflow:hidden; }
    .widget-slideshow.ss-empty { display:flex; align-items:center; justify-content:center; color:rgba(255,255,255,0.3); font-size:0.85rem; }
    .ss-slide { position:absolute; inset:0; }
    .ss-slide img { width:100%; height:100%; display:block; }
    .ss-slide:not(.ss-active) { display:none; }
    .widget-slideshow.ss-fade .ss-slide { display:block; opacity:0; transition:opacity 0.8s; }
    .widget-slideshow.ss-fade .ss-slide.ss-active { opacity:1; }

    /* slideshow — animerade övergångar (entering/leaving hanteras av JS) */
    .ss-slide.ss-entering, .ss-slide.ss-leaving { display:block !important; }

    /* slide — keyframes för alla riktningar */
    @keyframes ss-from-right  { from { transform:translateX(100%);  } to { transform:translateX(0); } }
    @keyframes ss-to-left     { from { transform:translateX(0);     } to { transform:translateX(-100%); } }
    @keyframes ss-from-left   { from { transform:translateX(-100%); } to { transform:translateX(0); } }
    @keyframes ss-to-right    { from { transform:translateX(0);     } to { transform:translateX(100%); } }
    @keyframes ss-from-bottom { from { transform:translateY(100%);  } to { transform:translateY(0); } }
    @keyframes ss-to-top      { from { transform:translateY(0);     } to { transform:translateY(-100%); } }
    @keyframes ss-from-top    { from { transform:translateY(-100%); } to { transform:translateY(0); } }
    @keyframes ss-to-bottom   { from { transform:translateY(0);     } to { transform:translateY(100%); } }

    .widget-slideshow.ss-slide[data-ss-dir="left"]  .ss-slide.ss-entering { animation:ss-from-right  0.7s ease forwards; }
    .widget-slideshow.ss-slide[data-ss-dir="left"]  .ss-slide.ss-leaving  { animation:ss-to-left     0.7s ease forwards; }
    .widget-slideshow.ss-slide[data-ss-dir="right"] .ss-slide.ss-entering { animation:ss-from-left   0.7s ease forwards; }
    .widget-slideshow.ss-slide[data-ss-dir="right"] .ss-slide.ss-leaving  { animation:ss-to-right    0.7s ease forwards; }
    .widget-slideshow.ss-slide[data-ss-dir="up"]    .ss-slide.ss-entering { animation:ss-from-bottom 0.7s ease forwards; }
    .widget-slideshow.ss-slide[data-ss-dir="up"]    .ss-slide.ss-leaving  { animation:ss-to-top      0.7s ease forwards; }
    .widget-slideshow.ss-slide[data-ss-dir="down"]  .ss-slide.ss-entering { animation:ss-from-top    0.7s ease forwards; }
    .widget-slideshow.ss-slide[data-ss-dir="down"]  .ss-slide.ss-leaving  { animation:ss-to-bottom   0.7s ease forwards; }

    /* wipe — keyframes för alla riktningar */
    @keyframes ss-wipe-left   { from { clip-path:inset(0 100% 0 0);   } to { clip-path:inset(0 0 0 0); } }
    @keyframes ss-wipe-right  { from { clip-path:inset(0 0 0 100%);   } to { clip-path:inset(0 0 0 0); } }
    @keyframes ss-wipe-up     { from { clip-path:inset(0 0 100% 0);   } to { clip-path:inset(0 0 0 0); } }
    @keyframes ss-wipe-down   { from { clip-path:inset(100% 0 0 0);   } to { clip-path:inset(0 0 0 0); } }

    .widget-slideshow.ss-wipe[data-ss-dir="left"]  .ss-slide.ss-entering { animation:ss-wipe-left   0.7s ease forwards; z-index:1; }
    .widget-slideshow.ss-wipe[data-ss-dir="right"] .ss-slide.ss-entering { animation:ss-wipe-right  0.7s ease forwards; z-index:1; }
    .widget-slideshow.ss-wipe[data-ss-dir="up"]    .ss-slide.ss-entering { animation:ss-wipe-up     0.7s ease forwards; z-index:1; }
    .widget-slideshow.ss-wipe[data-ss-dir="down"]  .ss-slide.ss-entering { animation:ss-wipe-down   0.7s ease forwards; z-index:1; }
    .widget-slideshow.ss-wipe .ss-slide.ss-leaving { z-index:0; }

    /* zoom */
    @keyframes ss-zoom-in  { from { transform:scale(1.08); opacity:0; } to { transform:scale(1); opacity:1; } }
    @keyframes ss-zoom-out { from { opacity:1; }                         to { opacity:0; } }
    .widget-slideshow.ss-zoom .ss-slide.ss-entering { animation:ss-zoom-in  0.7s ease forwards; z-index:1; }
    .widget-slideshow.ss-zoom .ss-slide.ss-leaving  { animation:ss-zoom-out 0.7s ease forwards; }

    /* vy-övergångar */
    body.vt-none .view { transition:none; }
    body.vt-slide .view { transition:none; }
    body.vt-slide .view.view-leaving,
    body.vt-slide .view.view-entering { opacity:1; }

    body.vt-slide[data-vt-dir="left"]  .view.view-entering { animation:ss-from-right  0.6s ease forwards; }
    body.vt-slide[data-vt-dir="left"]  .view.view-leaving  { animation:ss-to-left     0.6s ease forwards; }
    body.vt-slide[data-vt-dir="right"] .view.view-entering { animation:ss-from-left   0.6s ease forwards; }
    body.vt-slide[data-vt-dir="right"] .view.view-leaving  { animation:ss-to-right    0.6s ease forwards; }
    body.vt-slide[data-vt-dir="up"]    .view.view-entering { animation:ss-from-bottom 0.6s ease forwards; }
    body.vt-slide[data-vt-dir="up"]    .view.view-leaving  { animation:ss-to-top      0.6s ease forwards; }
    body.vt-slide[data-vt-dir="down"]  .view.view-entering { animation:ss-from-top    0.6s ease forwards; }
    body.vt-slide[data-vt-dir="down"]  .view.view-leaving  { animation:ss-to-bottom   0.6s ease forwards; }

    /* ics_schedule */
    .widget-ics-schedule { display:flex; flex-direction:column; height:100%; color:#fff; padding:0.3em 0.4em; font-size:clamp(8px,1.5cqh,12px); }
    .isch-outer { display:grid; flex:1; min-height:0; gap:0; }
    .isch-corner, .isch-corner-allday, .isch-section-label { color:rgba(255,255,255,0.3); font-size:0.7em; display:flex; align-items:center; justify-content:center; }
    .isch-col-head { text-align:center; padding:0.15em 0 0.25em; border-bottom:1px solid rgba(255,255,255,0.1); font-size:0.8em; }
    .isch-col-head.isch-today { border-bottom-color:rgba(59,130,246,0.8); }
    .isch-dow { font-weight:700; color:rgba(255,255,255,0.5); font-size:0.85em; text-transform:uppercase; }
    .isch-date { color:rgba(255,255,255,0.8); }
    .isch-col-head.isch-today .isch-date { color:#93c5fd; }
    .isch-allday-col { background:rgba(255,255,255,0.03); border-right:1px solid rgba(255,255,255,0.05); padding:0.15em 0.2em; min-height:1.4em; }
    .isch-allday-ev { font-size:0.68em; line-height:1.3; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; background:rgba(255,255,255,0.1); border-radius:2px; padding:0 0.2em; margin-bottom:1px; }
    .isch-time-col { position:relative; border-right:1px solid rgba(255,255,255,0.12); }
    .isch-hour-label { position:absolute; right:0.2em; font-size:0.62em; color:rgba(255,255,255,0.3); transform:translateY(-50%); line-height:1; font-variant-numeric:tabular-nums; }
    .isch-main-col { position:relative; border-right:1px solid rgba(255,255,255,0.05); overflow:hidden; }
    .isch-main-col.isch-today-col { background:rgba(59,130,246,0.07); }
    .isch-grid-line { position:absolute; left:0; right:0; height:1px; background:rgba(255,255,255,0.07); }
    .isch-ev-block { position:absolute; left:1px; right:1px; background:rgba(255,255,255,0.1); border-radius:2px; padding:0.1em 0.25em; overflow:hidden; display:flex; flex-direction:column; gap:0; min-height:0; }
    .isch-ev-time { font-size:0.6em; color:rgba(255,255,255,0.45); line-height:1.2; flex-shrink:0; font-variant-numeric:tabular-nums; }
    .isch-ev-title { font-size:0.68em; line-height:1.25; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .isch-loc { font-size:0.58em; color:rgba(255,255,255,0.35); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .isch-overflow-col { padding:0.1em 0.2em; border-right:1px solid rgba(255,255,255,0.05); }
    .isch-overflow-ev { font-size:0.65em; line-height:1.3; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .isch-t { color:rgba(255,255,255,0.4); margin-right:0.2em; font-variant-numeric:tabular-nums; }
    .isch-ev-inline { display:flex; gap:0.2em; align-items:baseline; overflow:hidden; }
    .isch-ev-compact { font-size:0.65em; line-height:1.1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .isch-now-line {
      position:absolute; left:0; right:0; height:2px;
      background:#ef4444;
      box-shadow: 0 0 4px rgba(239,68,68,0.7);
      pointer-events:none; z-index:10;
    }
    .isch-now-dot {
      position:absolute; right:-4px; width:8px; height:8px;
      border-radius:50%; background:#ef4444;
      box-shadow: 0 0 4px rgba(239,68,68,0.7);
      transform:translateY(-50%);
      pointer-events:none; z-index:11;
    }
    .widget-ics-schedule.ics-sm { font-size:clamp(7px,1.2cqh,10px); }
    .widget-ics-schedule.ics-lg { font-size:clamp(9px,1.9cqh,14px); }

    /* ics_week */
    .widget-ics-week { display:flex; flex-direction:column; height:100%; color:#fff; padding:0.3em 0.4em; font-size:clamp(8px,1.6cqh,12px); }
    .icw-grid { display:grid; grid-template-columns:repeat(7,1fr); grid-template-rows:auto 1fr; gap:2px; flex:1; min-height:0; }
    .icw-col-head { text-align:center; padding:0.2em 0 0.3em; border-bottom:1px solid rgba(255,255,255,0.12); }
    .icw-col-head.icw-today { border-bottom-color:rgba(59,130,246,0.8); }
    .icw-dow { display:block; font-size:0.7em; font-weight:700; letter-spacing:0.04em; text-transform:uppercase; color:rgba(255,255,255,0.4); }
    .icw-date { display:block; font-size:0.95em; font-weight:600; color:rgba(255,255,255,0.75); }
    .icw-col-head.icw-today .icw-date { color:#93c5fd; }
    .icw-col { background:rgba(255,255,255,0.03); border-radius:3px; padding:0.2em 0.25em; overflow:hidden; display:flex; flex-direction:column; gap:1px; }
    .icw-col.icw-today-col { background:rgba(59,130,246,0.1); outline:1px solid rgba(59,130,246,0.35); }
    .icw-ev { font-size:0.68em; line-height:1.25; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:rgba(255,255,255,0.8); }
    .icw-ev-allday { background:rgba(255,255,255,0.08); border-radius:2px; padding:0 0.2em; color:#fff; }
    .icw-t { color:rgba(255,255,255,0.45); font-size:0.9em; margin-right:0.2em; font-variant-numeric:tabular-nums; }
    .icw-s { }
    .icw-loc { color:rgba(255,255,255,0.35); font-size:0.85em; margin-left:0.2em; }
    .icw-more { font-size:0.6em; color:rgba(255,255,255,0.3); text-align:right; }
    .icw-empty { flex:1; }
    .widget-ics-week.ics-sm { font-size:clamp(7px,1.3cqh,10px); }
    .widget-ics-week.ics-lg { font-size:clamp(9px,2cqh,15px); }

    /* ics_month */
    .widget-ics-month { display:flex; flex-direction:column; height:100%; color:#fff; padding:0.4em 0.5em; font-size:clamp(8px,1.8cqh,13px); }
    .icm-title { text-align:center; font-weight:700; font-size:1.1em; padding-bottom:0.4em; color:rgba(255,255,255,0.85); }
    .icm-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; flex:1; min-height:0; }
    .icm-dow { text-align:center; font-size:0.72em; font-weight:600; color:rgba(255,255,255,0.4); padding:0.2em 0 0.4em; }
    .icm-cell { background:rgba(255,255,255,0.05); border-radius:3px; padding:0.15em 0.25em; overflow:hidden; min-height:0; }
    .icm-empty { background:transparent; }
    .icm-today { background:rgba(59,130,246,0.25); outline:1px solid rgba(59,130,246,0.6); }
    .icm-num { font-size:0.78em; font-weight:600; color:rgba(255,255,255,0.65); line-height:1.3; }
    .icm-today .icm-num { color:#93c5fd; }
    .icm-ev { font-size:0.62em; color:rgba(255,255,255,0.55); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; line-height:1.3; }
    .icm-t { color:rgba(255,255,255,0.35); margin-right:0.2em; font-variant-numeric:tabular-nums; }
    .icm-more { font-size:0.58em; color:rgba(255,255,255,0.3); }
    .icm-ev-span { border-left:none !important; padding-left:2px !important; border-radius:2px; opacity:0.85; }
    .icm-ev-span-start { border-radius:2px 0 0 2px; }
    .icm-ev-span-mid { border-radius:0; margin-left:-1px; margin-right:-1px; }
    .icm-ev-span-end { border-radius:0 2px 2px 0; margin-left:-1px; }

    /* Offline-banner */
    #offline-banner {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0;
      background: rgba(200,0,0,0.8);
      color: #fff;
      text-align: center;
      font-size: 0.8rem;
      padding: 4px;
      z-index: 100;
    }
    #offline-banner.visible { display: block; }

    /* Kiosk-navigation */
    #kiosk-nav {
      display: flex;
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      gap: 0.75rem;
      align-items: center;
      z-index: 200;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }
    #kiosk-nav.visible {
      opacity: 1;
      pointer-events: auto;
    }
    .kiosk-nav-btn {
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff;
      border-radius: 50%;
      width: 3rem;
      height: 3rem;
      font-size: 1.5rem;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
      transition: background 0.15s;
    }
    .kiosk-nav-btn:hover { background: rgba(0,0,0,0.8); }
    #nav-pause { font-size: 1rem; width: 2.4rem; height: 2.4rem; }
  </style>
</head>
<body class="vt-fade" data-vt-dir="left">
  <div id="offline-banner">Ingen anslutning till server</div>

  <div id="kiosk-nav">
    <button class="kiosk-nav-btn" id="nav-prev" title="Föregående vy">&#8249;</button>
    <button class="kiosk-nav-btn" id="nav-pause" title="Pausa/spela">&#9646;&#9646;</button>
    <button class="kiosk-nav-btn" id="nav-next" title="Nästa vy">&#8250;</button>
  </div>

  {% for view in views %}
  <div
    class="view{% if loop.first %} active{% endif %}"
    data-position="{{ view.position }}"
    data-duration="{{ view.duration_seconds }}"
    id="view-{{ view.position }}"
    style="grid-template-columns: repeat({{ view.grid_cols }}, 1fr); grid-template-rows: repeat({{ view.grid_rows }}, 1fr);"
  >
    {% for widget in view.widgets %}
    <div data-widget-id="{{ widget.widget_id }}"
         style="grid-column: {{ widget.col_start }} / {{ widget.col_end }}; grid-row: {{ widget.row_start }} / {{ widget.row_end }}; z-index: {{ widget.z_index }}; opacity: {{ (widget.opacity / 100) | round(2) }};">
      {{ widget.html | safe }}
    </div>
    {% endfor %}
  </div>
  {% endfor %}

  <script>
    const SCREEN_SLUG       = {{ screen.slug | tojson }};
    const SCREEN_TRANSITION = 'fade';
    const VIEW_COUNT  = {{ views | length }};
    const VIEWS       = [
      {% for v in views %}
      { position: {{ v.position }}, duration: {{ v.duration_seconds }} },
      {% endfor %}
    ];
  </script>
  <script src="/static/kiosk.js"></script>

  {% if show_debug %}
  <div id="debug-overlay" style="position:fixed;bottom:8px;right:8px;background:rgba(0,0,0,0.75);color:#fff;font-family:monospace;font-size:11px;padding:6px 10px;border-radius:4px;line-height:1.6;z-index:999">
    <div>{{ screen.name }} / {{ screen.slug }}</div>
    <div id="debug-view">Vy –/{{ views | length }}</div>
    <div id="debug-sse-age">SSE: –</div>
    <div id="debug-reconnects">Reconnects: 0</div>
    <div>v{{ version }}</div>
  </div>
  <script>window.__KIOSK_DEBUG = true;</script>
  {% endif %}
</body>
</html>
