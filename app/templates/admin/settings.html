{% extends "admin/base.html" %}

{% block title %}Inställningar - Skärmar Admin{% endblock %}

{% block content %}
<div class="mb-6">
  <h1 class="text-2xl font-bold">Inställningar</h1>
</div>

<div class="bg-white rounded-lg shadow max-w-2xl">
  <form action="/admin/settings/" method="post" class="p-6 space-y-6">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Tidszon</label>
      <p class="text-xs text-gray-500 mb-3">Används för att visa lokala tider i admin-gränssnittet och som förval för nya klock-widgets.</p>
      
      {% if error %}
      <div class="mb-4 bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded text-sm">
        {{ error }}
      </div>
      {% endif %}

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-medium text-gray-500 mb-1">Välj vanlig tidszon</label>
          <select id="tz_select" onchange="document.getElementById('timezone').value = this.value" class="w-full border border-gray-300 rounded px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="">-- Välj tidszon --</option>
            {% for tz in common_timezones %}
            <option value="{{ tz }}" {% if current_tz == tz %}selected{% endif %}>{{ tz }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label for="timezone" class="block text-xs font-medium text-gray-500 mb-1">Eller ange IANA-tidszon</label>
          <input type="text" id="timezone" name="timezone" value="{{ current_tz }}" required
                 class="w-full border border-gray-300 rounded px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
      </div>
    </div>

    <div class="flex justify-end pt-4 border-t border-gray-100">
      <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded text-sm hover:bg-blue-700 transition-colors">
        Spara inställningar
      </button>
    </div>
  </form>
</div>
{% endblock %}
