<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Skärmar Admin{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.3"></script>
  {% block head %}{% endblock %}
</head>
<body class="bg-gray-100 min-h-screen">
  <nav class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between">
    <div class="flex items-center gap-6">
      <a href="/admin/" class="font-semibold text-gray-900">Skärmar</a>
      <a href="/admin/channels" class="text-sm text-gray-600 hover:text-gray-900">Kanaler</a>
      <a href="/admin/widgets" class="text-sm text-gray-600 hover:text-gray-900">Widgets</a>
      <a href="/admin/layouts" class="text-sm text-gray-600 hover:text-gray-900">Layouter</a>
      <a href="/admin/media" class="text-sm text-gray-600 hover:text-gray-900">Media</a>
      <a href="/admin/palette" class="text-sm text-gray-600 hover:text-gray-900">Palett</a>
    </div>
    <div class="flex items-center gap-4">
    <a href="/admin/notifications/" class="relative inline-flex items-center text-gray-500 hover:text-gray-900 ml-2" title="Notiser">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
      </svg>
      {% set _unseen = unseen_notification_count() %}
      {% if _unseen > 0 %}
      <span class="absolute -top-1.5 -right-1.5 bg-red-500 text-white text-[9px] font-bold rounded-full min-w-[16px] h-4 flex items-center justify-center px-0.5 leading-none">{{ _unseen if _unseen < 100 else '99+' }}</span>
      {% endif %}
    </a>
    <form action="/admin/logout" method="post">
      <button type="submit" class="text-sm text-gray-500 hover:text-gray-900">Logga ut</button>
    </form>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-6 py-8">
    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}
</body>
</html>
