<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Skärmar Admin{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.3"></script>
  {% block head %}{% endblock %}
</head>
<body class="bg-gray-100 min-h-screen">
  <nav class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between">
    <div class="flex items-center gap-6">
      <a href="/admin/" class="font-semibold text-gray-900">Skärmar</a>
      <a href="/admin/widgets" class="text-sm text-gray-600 hover:text-gray-900">Widgets</a>
      <a href="/admin/layouts" class="text-sm text-gray-600 hover:text-gray-900">Layouter</a>
      <a href="/admin/media" class="text-sm text-gray-600 hover:text-gray-900">Media</a>
    </div>
    <form action="/admin/logout" method="post">
      <button type="submit" class="text-sm text-gray-500 hover:text-gray-900">Logga ut</button>
    </form>
  </nav>

  <main class="max-w-6xl mx-auto px-6 py-8">
    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}
</body>
</html>
