{% extends "admin/base.html" %}
{% block title %}Ny widget{% endblock %}
{% block content %}
<div class="max-w-2xl">
  <h1 class="text-2xl font-bold mb-6">Ny widget</h1>

  {% if error %}
  <p class="mb-4 text-sm text-red-600 bg-red-50 rounded px-3 py-2">{{ error }}</p>
  {% endif %}

  <form method="post" action="/admin/widgets/new" class="bg-white rounded-lg shadow p-6 space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Namn (intern identifierare)</label>
      <input type="text" name="name" required class="w-full border border-gray-300 rounded px-3 py-2 text-sm">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Typ</label>
      <select name="kind" required class="w-full border border-gray-300 rounded px-3 py-2 text-sm">
        {% for value, label in kinds %}
        <option value="{{ value }}">{{ label }}</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Konfiguration (JSON)</label>
      <textarea name="config_json" rows="8" class="w-full border border-gray-300 rounded px-3 py-2 text-sm font-mono">{}</textarea>
    </div>
    <div class="flex gap-3 pt-2">
      <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded text-sm hover:bg-blue-700">Skapa</button>
      <a href="/admin/widgets" class="px-4 py-2 text-sm text-gray-600 hover:text-gray-900">Avbryt</a>
    </div>
  </form>
</div>
{% endblock %}
