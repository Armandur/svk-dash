{% extends "admin/base.html" %}
{% block title %}Skärmar{% endblock %}
{% block content %}
<div class="flex items-center justify-between mb-6">
  <h1 class="text-2xl font-bold">Skärmar</h1>
  <a href="/admin/screens/new" class="bg-blue-600 text-white px-4 py-2 rounded text-sm hover:bg-blue-700">+ Ny skärm</a>
</div>

{% if screens %}
<div class="grid gap-3">
  {% for screen in screens %}
  <div class="bg-white rounded-lg shadow p-4 flex items-center justify-between">
    <div>
      <span class="font-medium">{{ screen.name }}</span>
      <span class="ml-3 text-sm text-gray-500"><code class="bg-gray-100 px-1 rounded">/s/{{ screen.slug }}</code></span>
    </div>
    <a href="/admin/screens/{{ screen.id }}" class="text-sm text-blue-600 hover:text-blue-800">Öppna</a>
  </div>
  {% endfor %}
</div>
{% else %}
<p class="text-gray-500">Inga skärmar ännu. <a href="/admin/screens/new" class="text-blue-600">Skapa en</a>.</p>
{% endif %}
{% endblock %}
