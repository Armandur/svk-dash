{% extends "admin/base.html" %}
{% block title %}Ny kanal{% endblock %}
{% block content %}
<div class="max-w-lg">
  <h1 class="text-2xl font-bold mb-6">Ny kanal</h1>

  <form method="post" action="/admin/channels/new" class="bg-white rounded-lg shadow p-6 space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Namn</label>
      <input type="text" name="name" required class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Beskrivning</label>
      <textarea name="description" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" rows="3"></textarea>
    </div>
    <div class="pt-2 flex gap-3">
      <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded text-sm hover:bg-blue-700">Skapa</button>
      <a href="/admin/channels" class="px-4 py-2 text-sm text-gray-600 hover:text-gray-900">Avbryt</a>
    </div>
  </form>
</div>
{% endblock %}
