<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logga in – Skärmar</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
  <div class="bg-white rounded-lg shadow p-8 w-full max-w-sm">
    <h1 class="text-xl font-semibold mb-6">Skärmar – Admin</h1>

    {% if error %}
    <p class="mb-4 text-sm text-red-600 bg-red-50 rounded px-3 py-2">{{ error }}</p>
    {% endif %}

    <form method="post" action="/admin/login">
      <label class="block text-sm font-medium text-gray-700 mb-1" for="password">Lösenord</label>
      <input
        id="password"
        type="password"
        name="password"
        autofocus
        required
        class="w-full border border-gray-300 rounded px-3 py-2 text-sm mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500"
      >
      <button
        type="submit"
        class="w-full bg-blue-600 text-white rounded px-4 py-2 text-sm font-medium hover:bg-blue-700"
      >
        Logga in
      </button>
    </form>
  </div>
</body>
</html>
